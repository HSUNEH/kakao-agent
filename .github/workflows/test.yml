name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
      - run: npm run lint
      - run: npm run format:check
